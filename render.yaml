databases:
  - name: banking-db
    plan: free
    databaseName: banking
    user: banking

services:
  - name: banking-redis
    type: keyvalue
    plan: free

  - name: banking-backend
    type: web
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: banking-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: banking-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["http://localhost:5173"]'
